    <!-- <main class="max-w-7xl mx-auto px-6 py-12 flex flex-col md:flex-row gap-12" x-data="{ activeSection: 'general' }"> -->
    <main class="max-w-7xl mx-auto px-6 py-12 flex flex-col md:flex-row gap-12" 
      x-data="{ 
        activeSection: 'general',
        initScrollObserver() {
            if (window.innerWidth < 768) return;

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        this.activeSection = entry.target.id;
                    }
                });
            }, { 
                // Ekranning yuqori qismidan 25% pastda bo'lganda aktiv qiladi
                rootMargin: '-25% 0px -70% 0px',
                threshold: 0
            });

            document.querySelectorAll('section[id]').forEach((section) => {
                observer.observe(section);
            });
        }
      }"
      x-init="setTimeout(() => initScrollObserver(), 500)">
        
        <aside class="w-full md:w-72 flex-shrink-0">
            <div class="sticky top-32 space-y-2">
                <template x-for="cat in t[lang].faqCategories" :key="cat.id">
                    <a :href="'#' + cat.id" 
                       class="block px-4 py-3 rounded-lg text-sm font-medium transition-all hover:bg-gray-100"
                       :class="activeSection === cat.id ? 'bg-blue-50 text-blue-600 border-l-4 border-blue-600 font-bold' : 'text-gray-500'"
                       @click="activeSection = cat.id"
                       x-text="cat.title">
                    </a>
                </template>
            </div>
        </aside>

        <div class="flex-1 space-y-12">
            <template x-for="cat in t[lang].faqCategories" :key="cat.id">
                <section :id="cat.id" class="scroll-mt-32">
                    <h2 class="text-2xl font-bold mb-6 text-gray-800" x-text="cat.title"></h2>
                    <div class="space-y-4">

                                    <i class="fas fa-chevron-down text-blue-500 transition-transform duration-300" :class="open ? 'rotate-180' : ''"></i>
                                </button>

                                </div>
                            </div>

    <script>
        function localizer() {
           let selectedLang = localStorage.getItem('navbat_ol_user_lang');
    
            if (!selectedLang) {
                // Brauzer tilini tekshirish (masalan: 'ru-RU', 'uz-UZ')
                const browserLang = navigator.language || navigator.userLanguage;
                
                // Agar brauzer tili ruscha bo'lsa, yoshi kattalar deb taxmin qilib Kirillni beramiz
                if (browserLang.startsWith('ru')) {
                    selectedLang = 'uz_cyr';

                    selectedLang = 'uz'; // Qolgan holatlarda Lotin
                }

                lang: selectedLang,
                // Til o'zgarganda xotiraga saqlash funksiyasi
