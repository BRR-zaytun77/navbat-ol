<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Navbat-Ol | Loyiha haqida — About Us</title>
    <meta name="description" content="Navbat-Ol haqida ko'proq bilib oling. Tiyn Zaytun LLC tomonidan ishlab chiqilgan onlayn navbat tizimi. Our mission, vision and team.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://navbatol.uz/about.html">

    <meta property="og:title" content="About Navbat-Ol — Tiyn Zaytun LLC">
    <meta property="og:description" content="Learn about Navbat-Ol's mission to digitize queues across Uzbekistan.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://navbatol.uz/about.html">

    <link rel="alternate" hreflang="uz" href="https://navbatol.uz/about.html">
    <link rel="alternate" hreflang="ru" href="https://navbatol.uz/about.html?lang=ru">
    <link rel="alternate" hreflang="en" href="https://navbatol.uz/about.html?lang=en">
    <link rel="alternate" hreflang="ar" href="https://navbatol.uz/about.html?lang=ar">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "AboutPage",
      "url": "https://navbatol.uz/about.html",
      "name": "About Navbat-Ol",
      "description": "Learn about Navbat-Ol's mission to digitize queue management across Uzbekistan.",
      "publisher": { "@type": "Organization", "name": "Tiyn Zaytun LLC", "url": "https://navbatol.uz" }
    }
    </script>

    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    

    <style>
        .values-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin-top: 8px;
        }
        .value-card {
            background: #f9fafb; border: 1px solid #e5e7eb;
            border-radius: 20px; padding: 28px 24px; text-align: center;
        }
        .value-card .vi { font-size: 1.6rem; color: #2563eb; margin-bottom: 12px; }
        .value-card h3 { font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
        .value-card p { font-size: 14px; color: #6b7280; line-height: 1.6; }

        .stat-row { display: flex; justify-content: center; gap: 48px; flex-wrap: wrap; padding: 40px 24px; background: #eff6ff; border-top: 1px solid #dbeafe; border-bottom: 1px solid #dbeafe; margin-bottom: 0; }
        .stat { text-align: center; }
        .stat .num { font-family: 'Sora', sans-serif; font-size: 2.5rem; font-weight: 800; color: #2563eb; }
        .stat .lbl { font-size: 12px; color: #6b7280; margin-top: 4px; font-weight: 500; }
    </style>
</head>
<body x-data="localizer('about')" x-init="init()">

    <!-- NAV (identical across all pages) -->
    <nav class="site-nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">Navbat<span>-Ol</span></a>
            <ul class="nav-links">
                <li><a href="index.html#features" x-text="t[lang].menuFeatures"></a></li>
                <li><a href="about.html" class="active" x-text="t[lang].menuAbout"></a></li>
                <li><a href="faq.html" x-text="t[lang].menuFaq"></a></li>
                <li><a href="terms.html" x-text="t[lang].menuTerms"></a></li>
                <li><a href="privacy.html" x-text="t[lang].menuPrivacy"></a></li>
            </ul>
            <div class="nav-right">
                <select class="lang-select" x-model="lang">
                    <option value="uz">O'zbek</option>
                    <option value="uz_cyr">Ўзбек</option>
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                    <option value="ar">العربية</option>
                </select>
                <a href="index.html#download" class="btn-primary" x-text="t[lang].downloadBtn"></a>
                <button class="hamburger" @click="mobileMenuOpen = !mobileMenuOpen" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <div class="mobile-menu" :class="{ open: mobileMenuOpen }">
            <a href="index.html#features" x-text="t[lang].menuFeatures"></a>
            <a href="about.html" x-text="t[lang].menuAbout"></a>
            <a href="faq.html" x-text="t[lang].menuFaq"></a>
            <a href="terms.html" x-text="t[lang].menuTerms"></a>
            <a href="privacy.html" x-text="t[lang].menuPrivacy"></a>
            <div class="lang-row">
                <button class="lang-btn" :class="{ active: lang==='uz' }" @click="lang='uz'">O'zbek</button>
                <button class="lang-btn" :class="{ active: lang==='uz_cyr' }" @click="lang='uz_cyr'">Ўзбек</button>
                <button class="lang-btn" :class="{ active: lang==='ru' }" @click="lang='ru'">Рус</button>
                <button class="lang-btn" :class="{ active: lang==='en' }" @click="lang='en'">EN</button>
                <button class="lang-btn" :class="{ active: lang==='ar' }" @click="lang='ar'">ع</button>
            </div>
        </div>
    </nav>

    <!-- PAGE HERO -->
    <div class="page-hero">
        <h1 x-text="t[lang].aboutTitle"></h1>
    </div>

    <!-- STATS STRIP -->
    <div class="stat-row">
        <div class="stat"><div class="num">5</div><div class="lbl" x-text="lang==='ar'?'لغات':'Languages'"></div></div>
        <div class="stat"><div class="num">150+</div><div class="lbl" x-text="lang==='ar'?'تقييم':'Ratings'"></div></div>
        <div class="stat"><div class="num">2026</div><div class="lbl" x-text="lang==='ar'?'تأسست':'Founded'"></div></div>
    </div>

    <!-- CONTENT -->
    <div class="content-section" style="padding-top:48px;">

        <div class="content-block">
            <h2 x-text="t[lang].aboutMission"></h2>
            <p x-text="t[lang].aboutMissionText"></p>
        </div>

        <div class="content-block">
            <h2 x-text="t[lang].aboutVision"></h2>
            <p x-text="t[lang].aboutVisionText"></p>
        </div>

        <div class="content-block">
            <h2 x-text="t[lang].aboutTeam"></h2>
            <p x-text="t[lang].aboutTeamText"></p>
        </div>

        <div class="content-block">
            <h2 style="margin-bottom:24px;" x-text="lang==='ar'?'قيمنا':lang==='ru'?'Наши ценности':lang==='en'?'Our Values':'Qadriyatlarimiz'"></h2>
            <div class="values-grid">
                <template x-for="v in t[lang].aboutValues" :key="v.title">
                    <div class="value-card">
                        <div class="vi"><i :class="v.icon"></i></div>
                        <h3 x-text="v.title"></h3>
                        <p x-text="v.desc"></p>
                    </div>
                </template>
            </div>
        </div>

    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="footer-links">
            <a href="about.html" x-text="t[lang].menuAbout"></a>
            <a href="faq.html" x-text="t[lang].menuFaq"></a>
            <a href="terms.html" x-text="t[lang].menuTerms"></a>
            <a href="privacy.html" x-text="t[lang].menuPrivacy"></a>
        </div>
        <p class="footer-copy">&copy; 2026 Tiyn Zaytun LLC. <span x-text="t[lang].footerRights"></span></p>
        <p class="footer-note" x-text="t[lang].footerNote"></p>
    </footer>


    <script src="shared.js"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
