@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

:root {

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {

}

/* NAV */
nav.site-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;

    backdrop-filter: saturate(180%) blur(20px);

}
.nav-inner {
    max-width: 1200px; margin: 0 auto;

}
.nav-logo { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.3rem; text-decoration: none; color: var(--gray-900); white-space: nowrap; }
.nav-logo span { color: var(--blue); }

.nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
.nav-links a { font-size: 13px; font-weight: 500; color: var(--gray-600); text-decoration: none; transition: color .2s; white-space: nowrap; }
.nav-links a:hover, .nav-links a.active { color: var(--blue); }

.nav-right { display: flex; align-items: center; gap: 16px; }

select.lang-select {
    background: transparent; border: none; font-size: 13px; font-weight: 600;
    color: var(--gray-700); cursor: pointer; outline: none; font-family: 'DM Sans', sans-serif;
}

.btn-primary {
    background: var(--blue); color: #fff;
    padding: 8px 20px; border-radius: 999px;
    font-size: 12px; font-weight: 700; text-decoration: none;

}
.btn-primary:hover { background: var(--blue-dark); transform: scale(1.03); }

.hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
.hamburger span { display: block; width: 22px; height: 2px; background: var(--gray-900); margin: 5px 0; border-radius: 2px; transition: all .3s; }

/* MOBILE MENU */
.mobile-menu {
    display: none; flex-direction: column; gap: 0;
    background: rgba(255,255,255,0.97); backdrop-filter: blur(20px);

    padding: 12px 24px 20px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a { font-size: 15px; font-weight: 500; color: var(--gray-700); text-decoration: none; padding: 11px 0; border-bottom: 1px solid var(--gray-100); }
.mobile-menu a:last-child { border-bottom: none; }
.mobile-menu a:hover { color: var(--blue); }
.mobile-menu .lang-row { display: flex; gap: 10px; padding-top: 14px; flex-wrap: wrap; }
.mobile-menu .lang-btn { font-size: 12px; font-weight: 600; background: var(--gray-100); border: none; padding: 6px 12px; border-radius: 999px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.mobile-menu .lang-btn.active { background: var(--blue); color: #fff; }

.page-hero h1 {
    font-family: 'Sora', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(180deg, #111827 0%, #6b7280 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
}
.page-hero .date { font-size: 13px; color: var(--gray-400); }

/* CONTENT */
.content-section {
    max-width: 780px; margin: 0 auto; padding: 0 24px 80px;
}
.content-block {
    background: #fff; border: 1px solid var(--gray-200);
    border-radius: 20px; padding: 32px 36px; margin-bottom: 20px;
}
.content-block h2 {
    font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 700;
    margin-bottom: 12px; color: var(--gray-900);
}
.content-block p { color: var(--gray-600); line-height: 1.75; font-size: 15px; }

/* FOOTER */
footer.site-footer {
    padding: 56px 24px 40px;
    text-align: center;
    color: var(--gray-400);
    border-top: 1px solid var(--gray-200);
}
.footer-links { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
.footer-links a { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--gray-500); text-decoration: none; transition: color .2s; }
.footer-links a:hover { color: var(--gray-900); }
.footer-copy { font-size: 13px; margin-bottom: 8px; }
.footer-note { font-size: 11px; max-width: 440px; margin: 0 auto; line-height: 1.7; }

/* SOCIAL */
.social-row { display: flex; justify-content: center; gap: 32px; font-size: 1.8rem; margin-bottom: 40px; }
.social-row a { color: var(--gray-400); transition: color .2s; }
.social-row a:hover { color: var(--blue); }

@media (max-width: 768px) {
    .nav-links, .nav-right .btn-primary { display: none !important; }
    .hamburger { display: block; }
    .content-block { padding: 24px 20px; }
}

    <script>
function localizer(activePage) {
    return {
        lang: localStorage.getItem('navbat_lang') || 'uz',
        activePage: activePage || 'home',
        mobileMenuOpen: false,

        init() {
            this.$watch('lang', val => {
                localStorage.setItem('navbat_lang', val);
                document.documentElement.dir = val === 'ar' ? 'rtl' : 'ltr';
                document.documentElement.lang = val === 'uz_cyr' ? 'uz' : val;
            });
            const saved = localStorage.getItem('navbat_lang') || 'uz';
            this.lang = saved;
            document.documentElement.dir = saved === 'ar' ? 'rtl' : 'ltr';

        t: {

                aboutTitle: 'Loyiha haqida',
                aboutMission: 'Bizning maqsadimiz',

                ],

                faqTitle: 'Ko\'p so\'raladigan savollar',
                faqSubtitle: "Savolingiz javobini topa olmadingizmi? Bizga murojaat qiling.",
                faqs: [
                    { q: 'Navbat-Ol ilovasi bepulmi?', a: "Ha, asosiy xususiyatlar foydalanuvchilar uchun mutlaqo bepul. Premium imkoniyatlar kelajakda taqdim etiladi." },
